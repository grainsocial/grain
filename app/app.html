<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <title>grain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=block"
      rel="stylesheet"
    />
    <script>
      document.fonts.ready.then(() => document.documentElement.classList.add("fonts-loaded"));
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script
      data-goatcounter="https://grain.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
