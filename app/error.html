<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>%sveltekit.error.message% — teal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@500;600&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Plus Jakarta Sans",
          -apple-system,
          sans-serif;
        background: #080b12;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
        padding: 24px;
      }
      .error-code {
        font-family: "Syne", sans-serif;
        font-size: 72px;
        font-weight: 800;
        color: #14b8a6;
        line-height: 1;
      }
      .error-title {
        font-family: "Syne", sans-serif;
        font-size: 24px;
        font-weight: 800;
      }
      .error-message {
        font-size: 15px;
        color: #64748b;
      }
      .error-link {
        margin-top: 16px;
        padding: 10px 24px;
        background: #14b8a6;
        color: #000;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
      }
      .error-link:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <span class="error-code">%sveltekit.status%</span>
      <h1 class="error-title">%sveltekit.error.message%</h1>
      <p class="error-message">Something unexpected happened.</p>
      <a href="/" class="error-link">Back to home</a>
    </div>
  </body>
</html>
